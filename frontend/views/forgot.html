<!DOCTYPE html>
<html ng-app="shortApp">

<head>

<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<script src="../app.js"></script>
<script src="../controllers/authController.js"></script>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    width:430px;
    padding:45px 40px;
    border-radius:20px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    text-align:center;
    color:#fff;
}

.card h2{
    margin:0 0 30px;
    font-size:38px;
    font-weight:700;
}

input{
    width:100%;
    height:55px;
    margin-bottom:18px;
    padding:0 18px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#fff;
    color:#111827;
    font-size:16px;
    box-sizing:border-box;
}

input::placeholder{
    color:#777;
}

input:focus{
    box-shadow:0 0 0 3px rgba(99,102,241,.35);
}

button{
    width:100%;
    height:55px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#6366F1;
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#4F46E5;
    transform:translateY(-2px);
}

.back-link{
    display:inline-block;
    margin-top:25px;
    color:#fff;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
    transition:.3s;
}

.back-link:hover{
    color:#E0E7FF;
}
</style>

</head>

<body ng-controller="AuthController">

<div class="card">

<h2>Reset Password</h2>

<input type="email" placeholder="Enter Email" ng-model="email">

<input type="password" placeholder="New Password" ng-model="newPassword">

<button ng-click="resetPassword()">
Reset Password
</button>
<p class="text-center mt-4">
    <a href="../index.html" class="back-link">
        ← Back to Login
    </a>
</p>

</div>

</body>
</html>
