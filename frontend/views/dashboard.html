<!DOCTYPE html>
<html ng-app="shortApp">

<head>

<title>Dashboard -URL Shortner</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<script src="../app.js"></script>
<script src="../controllers/urlController.js"></script>

<style>

body{
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:40px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-bottom:25px;
color:white;
}

.btn-main{
background:#6366F1;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
font-weight:600;
}

.table{
color:white;
}

.copy-btn{
background:#22c55e;
border:none;
padding:5px 10px;
border-radius:6px;
color:white;
}

.delete-btn{
background:#ef4444;
border:none;
padding:5px 10px;
border-radius:6px;
color:white;
}

</style>

</head>

<body ng-controller="UrlController">

<div class="container">

<!-- Create Link -->

<div class="card">

<h3>🔗 Create Short Link</h3>

<input class="form-control" placeholder="Paste long URL" ng-model="url">

<input 
  class="form-control mt-2"
  placeholder="Custom short (optional) "
  ng-model="customCode">

<button class="btn-main mt-3" ng-click="createLink()">
Shorten URL
</button>

<div class="alert alert-warning mt-3" ng-if="limitReached">

Free users can only create <b>3 links</b>.

<button class="btn btn-dark mt-2" ng-click="upgradePro()">
Upgrade to Pro
</button>

</div>

<div class="alert alert-success mt-3" ng-if="short">

<a href="http://localhost:5000/4diti/{{short}}" target="_blank">
http://localhost:5000/4diti/{{short}}
</a>

</div>

</div>


<!-- Table -->

<div class="card">

<h4>Your Links</h4>

<table class="table table-dark mt-3">

<thead>
<tr>
<th>#</th>
<th>Original</th>
<th>Short</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr ng-repeat="link in links track by $index">

<td>{{$index + 1}}</td>

<td style="max-width:300px; word-break:break-all;">
{{link.originalUrl}}
</td>

<td>
<a href="http://localhost:5000/4diti/{{link.shortUrl}}" target="_blank">
{{link.shortUrl}}
</a>
</td>

<td>

<button class="btn btn-success btn-sm me-2"
ng-click="copyLink(link.shortUrl)">
Copy
</button>

<button class="btn btn-danger btn-sm"
ng-click="deleteLink(link._id)">
Delete
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
