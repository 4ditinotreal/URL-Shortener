<!DOCTYPE html>
<html ng-app="shortApp">

<head>

<title>URL Shortener</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<script src="app.js"></script>
<script src="controllers/authController.js"></script>

<style>

body{
font-family:'Montserrat',sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Card */

.card-box{
width:420px;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* Title */

.title{
font-weight:600;
font-size:28px;
color:#111827;
text-align:center;
margin-bottom:25px;
}

/* Input */

.form-control{
border-radius:8px;
padding:12px;
}

/* Button */

.btn-main{
background:#6366F1;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
font-weight:600;
}

.btn-main:hover{
background:#4F46E5;
}

/* secondary button */

.btn-secondary-custom{
background:#111827;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
font-weight:600;
margin-top:10px;
}

.btn-secondary-custom:hover{
background:#000000;
}

</style>

</head>

<body>

<div class="card-box" ng-controller="AuthController">

<div class="title">
🔗URL Shortener
</div>

<input 
type="email"
class="form-control mb-3"
placeholder="Enter Email"
ng-model="email">

<input 
type="password"
class="form-control mb-3"
placeholder="Enter Password"
ng-model="password">

<button 
class="btn-main"
ng-click="signup()">
Signup
</button>

<button 
class="btn-secondary-custom"
ng-click="login()">
Login
</button>

<p style="margin-top:12px; text-align:center; color:white; cursor:pointer;"
onclick="window.location='views/forgot.html'">

Forgot Password?

</p>

</div>

</body>

</html>
